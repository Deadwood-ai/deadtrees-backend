services:
  mailpit:
    image: axllent/mailpit:latest
    # SMTP: 1025, HTTP API/UI: 8025
    # Tests use the service name (`mailpit`) from inside containers.
    ports:
      - "8025:8025"
      - "1025:1025"

  processor-test:
    build:
      context: .
      dockerfile: processor/Dockerfile
      # Only include essential files for build (excludes assets via .dockerignore)
    gpus: all
    runtime: nvidia
    env_file:
      # Load local Supabase keys from repo .env, avoiding accidental shell overrides.
      - ./.env
    # healthcheck:
    #   test: curl --fail http://127.0.0.1:5678/ || exit 1
    #   interval: 15s
    #   timeout: 1s
    #   retries: 5
    #   start_period: 2s
    ports:
      - '5678:5678'
    volumes:
      # - ./data:/data # need it for testing (pulling and pushing files to storage server)
      - ./processor:/app/processor
      - ./shared:/app/shared
      - ./assets:/app/assets
      - ./pytest.ini:/app/pytest.ini:ro
      # Mount a dedicated local test keypair so processor integration tests can SSH into nginx.
      - ${LOCAL_TEST_SSH_PRIVATE_KEY_PATH:-./.local/ssh/processing-to-storage}:/tmp/ssh-keys/processing-to-storage:ro
      - ${LOCAL_TEST_SSH_PUBLIC_KEY_PATH:-./.local/ssh/processing-to-storage.pub}:/tmp/ssh-keys/processing-to-storage.pub:ro
      # Docker socket for ODM container execution
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONPATH=/app
      - PYTEST_ADDOPTS=--color=yes
      - STORAGE_SERVER_IP=nginx
      - STORAGE_SERVER_USERNAME=root
      - STORAGE_SERVER_DATA_PATH=/data
      - PROCESSOR_USERNAME=processor@deadtrees.earth
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      - BASE_DIR=/data
      # Match the mounted SSH key location inside the test container.
      - SSH_PRIVATE_KEY_PATH=/tmp/ssh-keys/processing-to-storage
      - SSH_PRIVATE_KEY_PASSPHRASE=
      - ENV=development

      # NVIDIA GPU configuration
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # command: python -m debugpy --listen 0.0.0.0:5678 -c "print('Call the Processor Debugger individually.')"
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          # Keep the placeholder processor service lightweight on local dev machines.
          cpus: '2'
          memory: '8G'
  api-test:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      # Load local Supabase keys from repo .env, avoiding accidental shell overrides.
      - ./.env
    healthcheck:
      test: curl --fail http://127.0.0.1:8017/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1m30s
      start_interval: 1s
    ports:
      - '8017:8017'
      - '5679:5679'
    volumes:
      - ./data:/data:rw
      - ./api:/app/api # dev only, no rebuild needed
      - ./shared:/app/shared # dev only, no rebuild needed
      - ./assets:/app/assets
      - ./pytest.ini:/app/pytest.ini:ro
    environment:
      - PYTHONPATH=/app
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8017
      - PYTEST_ADDOPTS=--color=yes
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      - BASE_DIR=/data
      - ENV=development
      # Mailpit for api/tests/test_notifications.py
      - MAILPIT_SMTP_HOST=mailpit
      - MAILPIT_SMTP_PORT=1025
      - MAILPIT_API_URL=http://mailpit:8025
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # command: python -m debugpy --listen 0.0.0.0:5679 run.py server --reload=True
    command: python api/src/run.py server --reload=True

  nginx:
    build:
      context: ./nginx
      dockerfile: test-conf/Dockerfile
    healthcheck:
      test: ['CMD', 'service', 'nginx', 'status']
      interval: 15s
      timeout: 1s
      retries: 5
      start_period: 2s
    ports:
      - 8080:80
      - 2222:22
    volumes:
      - ./data:/data/:rw
      # Mount the matching public key so nginx can authorize processor-test SSH access.
      - ${LOCAL_TEST_SSH_PUBLIC_KEY_PATH:-./.local/ssh/processing-to-storage.pub}:/tmp/ssh-keys/processing-to-storage.pub:ro
      - ./nginx/test-conf:/etc/nginx/conf.d/:ro


  

networks:
  default:
    name: deadwood_network

# volumes:
  # nginx_ssh:  # This can be removed if not used by other services
