map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

limit_conn_zone $binary_remote_addr zone=prepackaged_per_ip:10m;
limit_conn_zone $server_name zone=prepackaged_global:10m;
limit_req_zone $binary_remote_addr zone=prepackaged_start_rate:10m rate=6r/m;
log_format prepackaged_safe '$remote_addr - $remote_user [$time_local] "$request_method $uri $server_protocol" '
                            '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                            'rt=$request_time range="$http_range"';

server {
    server_name localhost;
    listen 80 default_server;
    listen [::]:80 default_server;
    client_max_body_size 10G;

    # Resolve api-test at request time so nginx starts even when api-test is not running
    # (e.g. processor-only test runs). Docker's embedded DNS is always at 127.0.0.11.
    resolver 127.0.0.11 valid=5s;

    index =401;
    # root /data;


    location /api/v1 {
        set $api_backend "api-test:8017";
        rewrite  ^/api/v1/?(.*)$ /$1 break;
        proxy_pass http://$api_backend;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Swagger UI websockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

    }

    location = /_prepackaged_download_auth {
        internal;
        set $api_backend "api-test:8017";
        proxy_pass http://$api_backend/prepackaged/grants/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Download-Token $arg_token;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /prepackaged/v1/ {
        alias /data/assets/prepackaged_datasets_out/;
        autoindex off;
        try_files $uri =404;

        access_log /var/log/nginx/prepackaged_access.log prepackaged_safe;
        auth_request /_prepackaged_download_auth;
        limit_conn prepackaged_per_ip 1;
        limit_conn prepackaged_global 3;
        limit_req zone=prepackaged_start_rate burst=3 nodelay;
        limit_rate_after 512m;
        limit_rate 20m;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        add_header Accept-Ranges bytes;
        add_header Cache-Control "private, no-store";
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range,Content-Type' always;
    }

    location /cogs/v1 {
        #rewrite  ^/cogs/v1/(.*)  /$1 break;
        # set the root for this route
        alias /data/cogs;

        # enable indexing
        autoindex on;
        autoindex_exact_size off;
        try_files $uri $uri/ =404;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
    }

    location /thumbnails/v1 {
        #rewrite  ^/cogs/v1/(.*)  /$1 break;
        # set the root for this route
        alias /data/thumbnails;

        # enable indexing
        autoindex on;
        autoindex_exact_size off;
        try_files $uri $uri/ =404;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
    }

    location /downloads/v1 {
        alias /data/downloads/;
        
        # enable indexing
        autoindex on;
        autoindex_exact_size off;
        try_files $uri $uri/ =404;
        
        # Enable byte-range requests
        add_header Accept-Ranges bytes;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range,Content-Type' always;
        
        # Enable large file optimizations
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }

    location ^~ /assets/v1/prepackaged_datasets_out/ {
        autoindex off;
        return 404;
    }

    location /assets/v1 {
        # set the root for this route
        alias /data/assets;

        # enable indexing
        autoindex on;
        autoindex_exact_size off;
        try_files $uri $uri/ =404;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
    }

    location /products/v1 {
        # set the root for this route
        alias /data/products;

        # enable indexing
        autoindex on;
        autoindex_exact_size off;
        try_files $uri $uri/ =404;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
    }

    # Block directory listing at root /reference/ level (security - hides UUID list)
    location = /reference/ {
        return 404;
    }

    # Enable directory indexing for paths under /reference/{uuid}/
    # This requires knowing the UUID, but then allows browsing the structure
    location ~ ^/reference/([^/]+)(/.*)?$ {
        # URL: /reference/{uuid}/{dataset_id}/geotiff/...
        # Maps to: /data/reference_export/{uuid}/{dataset_id}/geotiff/...
        # $1 = UUID, $2 = rest of path (including leading /)
        alias /data/reference_export/$1$2;

        # Enable directory indexing once UUID is known
        autoindex on;
        autoindex_exact_size off;
        autoindex_format html;
        
        # CORS
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
        
        # Cache control for static files
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
